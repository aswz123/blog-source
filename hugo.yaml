baseURL: "http://122.51.94.127/"
locale: "zh-cn"
title: "我的博客"
theme: "PaperMod"

# 每页文章数
paginate: 10

# 启用 RSS
enableRobotsTXT: true
enableEmoji: true

# 语法高亮
markup:
  highlight:
    style: "dracula"
    noClasses: false

params:
  # 首页信息
  homeInfoParams:
    Title: "👋 欢迎来到我的博客"
    Content: "记录技术、生活和思考。"

  # 社交链接
  socialIcons:
    - name: "github"
      url: "https://github.com/aswz123"

  # 显示文章元信息
  ShowReadingTime: true
  ShowWordCount: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - "title"
      - "content"

menu:
  main:
    - name: "🏠 首页"
      url: "/"
      weight: 1
    - name: "📂 分类"
      url: "/categories/"
      weight: 2
    - name: "🏷️ 标签"
      url: "/tags/"
      weight: 3
    - name: "🔍 搜索"
      url: "/search/"
      weight: 4
    - name: "👤 关于"
      url: "/about/"
      weight: 5
