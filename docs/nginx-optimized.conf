# ============================================================
# Nginx 优化配置 — 适用于 Hugo 静态博客 + 2C2G 服务器
# 放置路径：/etc/nginx/sites-available/blog 或 /etc/nginx/nginx.conf
# ============================================================

# ---- 全局优化 ----
user www-data;
worker_processes 2;          # 2核 → 2个worker就够了
worker_rlimit_nofile 65535;

events {
    worker_connections 2048;  # 2G内存不要开太高
    multi_accept on;
    use epoll;
}

http {
    # ---- 基础优化 ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;        # 隐藏 Nginx 版本号
    server_names_hash_bucket_size 64;

    # ---- MIME 类型 ----
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---- 日志（生产环境用 warn 级别减少 IO） ----
    log_format minimal '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log minimal buffer=32k flush=10s;
    error_log /var/log/nginx/error.log warn;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/ld+json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # ---- Brotli（如果已编译 brotli 模块） ----
    # 如果没有 brotli 模块，删除下面这段
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css text/xml text/javascript
                 application/javascript application/json
                 application/xml+rss image/svg+xml;

    # ---- 安全头 ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- 限流（2C2G 防 CC 攻击） ----
    limit_req_zone $binary_remote_addr zone=page:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    # ============================================================
    # 主站点
    # ============================================================
    server {
        listen 80;
        listen [::]:80;
        server_name aswzblog.me www.aswzblog.me;

        # ---- 限流 ----
        limit_req zone=page burst=20 nodelay;
        limit_conn connlimit 20;

        # ---- 根目录 ----
        root /var/www/blog;
        index index.html;

        # ---- 安全头（站点级） ----
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- 静态资源缓存 ----
        # 指纹化的 CSS/JS（可缓存1年）
        location ~* \.(css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 图片/字体（缓存30天）
        location ~* \.(png|jpg|jpeg|webp|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
            # 对外部资源取消限流
            limit_req zone=static burst=100 nodelay;
        }

        # RSS / Sitemap / JSON（缓存1小时）
        location ~* ^/(index\.xml|sitemap\.xml|index\.json|robots\.txt) {
            expires 1h;
            add_header Cache-Control "public";
        }

        # ---- 404 页面 ----
        error_page 404 /404.html;

        # ---- 安全：阻止隐藏文件访问 ----
        location ~ /\. {
            deny all;
        }

        # ---- Gzip 静态文件（如果 CI 生成了 .gz 文件） ----
        gzip_static on;

        # ---- Hugo 生成的干净 URL ----
        # 所有非文件请求都尝试 .html 后缀
        location / {
            try_files $uri $uri.html $uri/ =404;
        }
    }

    # ---- HTTP → HTTPS 重定向（获取证书后用） ----
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name aswzblog.me www.aswzblog.me;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name aswzblog.me www.aswzblog.me;
    #
    #     ssl_certificate     /etc/letsencrypt/live/aswzblog.me/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/aswzblog.me/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     # ... 其余同上 ...
    # }
}
