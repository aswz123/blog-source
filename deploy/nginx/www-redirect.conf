# www → 裸域重定向
server {
    listen 80;
    server_name www.aswzblog.me;
    return 301 https://aswzblog.me$request_uri;
}
server {
    listen 443 ssl http2;
    server_name www.aswzblog.me;
    ssl_certificate /etc/letsencrypt/live/aswzblog.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aswzblog.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://aswzblog.me$request_uri;
}
