# ============================================================
# aswzblog.me — Cloudflare Flexible 模式
# 部署路径: /etc/nginx/sites-enabled/aswzblog.me.conf
# ============================================================

server {
    listen 443 ssl http2;
    listen 80;
    server_name aswzblog.me;

    root /var/www/blog;
    index index.html;

    # ---- 安全头 ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- 主路由 ----
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ---- 指纹化 CSS/JS — 缓存1年 ----
    location ~* "\.[a-f0-9]{8,}\.(css|js)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- 普通 CSS/JS — 缓存7天 ----
    location ~* "\.(css|js)$" {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- 图片/字体 — 缓存30天 ----
    location ~* "\.(png|jpg|jpeg|webp|gif|ico|svg|woff2?|ttf|eot)$" {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ---- RSS / Sitemap / JSON — 缓存1小时 ----
    location ~* "^/(index\.xml|sitemap\.xml|index\.json|robots\.txt)$" {
        expires 1h;
        add_header Cache-Control "public";
    }

    # ---- 阻止隐藏文件 ----
    location ~ "/\." {
        deny all;
    }

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/aswzblog.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aswzblog.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
