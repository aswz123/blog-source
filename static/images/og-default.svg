<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow1" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="80%" r="35%">
      <stop offset="0%" stop-color="rgba(56,189,248,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- 网格 -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="0"/>
  </g>

  <!-- HUD 边框 -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="rgba(201,168,76,0.12)" stroke-width="1"/>
  <rect x="44" y="44" width="1112" height="542" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>

  <!-- 角落装饰 -->
  <g stroke="rgba(201,168,76,0.3)" stroke-width="2">
    <line x1="40" y1="60" x2="40" y2="40"/>   <line x1="40" y1="40" x2="60" y2="40"/>
    <line x1="1160" y1="60" x2="1160" y2="40"/> <line x1="1160" y1="40" x2="1140" y2="40"/>
    <line x1="40" y1="570" x2="40" y2="590"/>  <line x1="40" y1="590" x2="60" y2="590"/>
    <line x1="1160" y1="570" x2="1160" y2="590"/><line x1="1160" y1="590" x2="1140" y2="590"/>
  </g>

  <!-- 标题 -->
  <text x="600" y="260" text-anchor="middle" font-family="'DengXian','Microsoft YaHei',sans-serif" font-size="56" font-weight="700" fill="#c9a84c" letter-spacing="8">
    我的博客
  </text>

  <!-- 副标题 -->
  <text x="600" y="330" text-anchor="middle" font-family="'Cascadia Code',Consolas,monospace" font-size="22" fill="rgba(255,255,255,0.45)" letter-spacing="4">
    SYS.LOG:// 记录技术、生活和思考
  </text>

  <!-- 底部装饰线 -->
  <line x1="400" y1="380" x2="800" y2="380" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>

  <!-- 状态信息 -->
  <text x="80" y="590" font-family="'Cascadia Code',Consolas,monospace" font-size="14" fill="rgba(255,255,255,0.2)">
    SYS NOMINAL // COMM LINK ACTIVE
  </text>
  <text x="1120" y="590" text-anchor="end" font-family="'Cascadia Code',Consolas,monospace" font-size="14" fill="rgba(255,255,255,0.2)">
    T+ ASWZBLOG.ME
  </text>
</svg>
