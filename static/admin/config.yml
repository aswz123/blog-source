backend:
  name: github
  repo: aswz123/blog-source
  branch: main

media_folder: static/images
public_folder: /images

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: content/posts
    path: "{{slug}}"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - label: 标题
        name: title
        widget: string
      - label: 发布日期
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        picker_utc: false
        hint: 文章显示的发布日期
      - label: 发布
        name: draft
        widget: boolean
        default: true
        hint: 取消勾选后，推送代码即发布到网站
      - label: 分类
        name: categories
        widget: list
        required: false
      - label: 标签
        name: tags
        widget: list
        required: false
      - label: 摘要
        name: summary
        widget: text
        required: false
      - label: 正文
        name: body
        widget: markdown

  - name: pages
    label: 页面
    editor:
      preview: false
    files:
      - label: 关于我
        name: about
        file: content/about.md
        fields:
          - label: 标题
            name: title
            widget: string
          - label: 日期
            name: date
            widget: datetime
            format: "YYYY-MM-DDTHH:mm:ssZ"
            date_format: "YYYY-MM-DD"
            time_format: "HH:mm"
            picker_utc: false
          - label: 草稿
            name: draft
            widget: boolean
            default: false
          - label: 布局
            name: layout
            widget: hidden
            default: "page"
          - label: 正文
            name: body
            widget: markdown
